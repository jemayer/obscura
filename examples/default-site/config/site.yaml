base_url: https://example.com
title: "Obscura - A Static Site Generator for Photographers only"
theme: editorial
recent_shots_count: 10
# Default license for all photos (can be overridden per-photo in sidecar YAML).
# Options: all-rights-reserved, CC-BY-4.0, CC-BY-SA-4.0, CC-BY-NC-4.0,
#          CC-BY-NC-SA-4.0, CC-BY-ND-4.0, CC-BY-NC-ND-4.0, CC0-1.0,
#          or any custom text.
license: all-rights-reserved
# Default gallery layout: "masonry" (variable-height tiles) or "grid" (uniform cells).
# Individual galleries can override this in galleries.yaml.
# gallery_default_layout: masonry

# Social media links — shown on the contact page with monochromatic icons.
# Supported platforms: bluesky, mastodon, flickr, pixelfed
# social_links:
#   - platform: bluesky
#     url: https://bsky.app/profile/yourhandle
#   - platform: mastodon
#     url: https://mastodon.social/@yourhandle
#   - platform: flickr
#     url: https://www.flickr.com/photos/yourhandle
#   - platform: pixelfed
#     url: https://pixelfed.social/yourhandle
# Which metadata fields to show on photo detail pages.
# Options: date, camera, lens, settings, location, tags, license
# Use "exif" as shorthand for date + camera + lens + settings.
# Default: all fields shown.
# photo_display_fields: [date, camera, lens, settings, location, tags, license]

# Which metadata fields to show in the lightbox overlay.
# Options: date, camera, lens, settings, location, tags, license
# Use "exif" as shorthand for date + camera + lens + settings.
# Default: all fields shown.
# lightbox_display_fields: [date, camera, location, license]

images:
  breakpoints: [400, 800, 1200, 2400]
  webp_quality: 85
