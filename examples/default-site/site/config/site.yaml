base_url: https://example.com
title: "Obscura - A Static Site Generator for Photographers only"
# Short site description — used in OpenGraph previews when sharing your homepage.
# description: "Photography portfolio by Your Name"
theme: editorial
recent_shots_count: 10
# Default license for all photos (can be overridden per-photo in sidecar YAML).
# Options: all-rights-reserved, CC-BY-4.0, CC-BY-SA-4.0, CC-BY-NC-4.0,
#          CC-BY-NC-SA-4.0, CC-BY-ND-4.0, CC-BY-NC-ND-4.0, CC0-1.0,
#          or any custom text.
license: all-rights-reserved
# Default gallery layout: "masonry" (variable-height tiles) or "grid" (uniform cells).
# Individual galleries can override this in galleries.yaml.
# gallery_default_layout: masonry

# Social media links — shown in the site footer with monochromatic icons.
# Supported platforms: 500px, bluesky, flickr, github, instagram, mastodon, pixelfed
# social_links:
#   - platform: bluesky
#     url: https://bsky.app/profile/yourhandle
#   - platform: mastodon
#     url: https://mastodon.social/@yourhandle
#   - platform: flickr
#     url: https://www.flickr.com/photos/yourhandle
#   - platform: instagram
#     url: https://www.instagram.com/yourhandle
#   - platform: 500px
#     url: https://500px.com/p/yourhandle
#   - platform: pixelfed
#     url: https://pixelfed.social/yourhandle
#   - platform: github
#     url: https://github.com/yourhandle
# Navigation menu — customise which links appear in the site header.
# When omitted, the default menu is: Photography, Tags, Locations, Blog, About, Contact.
# URL values can be: built-in keywords (photography, tags, locations, blog),
# page references (page:about), literal paths (/custom/), or external URLs.
# navigation:
#   - label: Photography
#     url: photography
#   - label: Tags
#     url: tags
#   - label: Locations
#     url: locations
#   - label: Blog
#     url: blog
#   - label: About
#     url: page:about
#   - label: Contact
#     url: page:contact

# Hero image for the homepage. Set to "gallery-slug/photo-slug" to pin a
# specific photo. If omitted, the first landscape photo from recent shots
# is used automatically.
# hero_image: street/golden-hour-alley

# Which metadata fields to show on photo detail pages.
# Options: date, camera, lens, settings, location, tags, license
# Use "exif" as shorthand for date + camera + lens + settings.
# Default: all fields shown.
# photo_display_fields: [date, camera, lens, settings, location, tags, license]

# Which metadata fields to show in the lightbox overlay.
# Options: date, camera, lens, settings, location, tags, license
# Use "exif" as shorthand for date + camera + lens + settings.
# Default: all fields shown.
# lightbox_display_fields: [date, camera, location, license]

images:
  breakpoints: [400, 800, 1200, 2400]
  webp_quality: 85
