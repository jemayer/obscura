<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320" width="700" height="320">
  <defs>
    <linearGradient id="coneGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:0.0"/>
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:0.06"/>
    </linearGradient>
    <radialGradient id="haloGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip"><rect width="700" height="320"/></clipPath>
  </defs>

  <rect width="700" height="320" fill="none"/>

  <polygon points="350,72 195,258 505,258" fill="url(#coneGrad)" clip-path="url(#clip)"/>
  <line x1="350" y1="72" x2="195" y2="258" stroke="#0a0a0a" stroke-width="0.4" opacity="0.10"/>
  <line x1="350" y1="72" x2="505" y2="258" stroke="#0a0a0a" stroke-width="0.4" opacity="0.10"/>
  <line x1="170" y1="258" x2="530" y2="258" stroke="#0a0a0a" stroke-width="0.5" opacity="0.15"/>

  <circle cx="350" cy="70" r="28" fill="url(#haloGrad)" filter="url(#glow)"/>
  <circle cx="350" cy="70" r="5" fill="#0a0a0a" filter="url(#glow)"/>
  <circle cx="348.5" cy="68.5" r="1.4" fill="#555" opacity="0.5"/>

  <text
    x="350" y="182"
    font-family="'Playfair Display', 'Georgia', 'Times New Roman', serif"
    font-size="64" font-weight="400" letter-spacing="14"
    fill="#0a0a0a" text-anchor="middle"
  >OBSCURA</text>

  <line x1="200" y1="200" x2="500" y2="200" stroke="#0a0a0a" stroke-width="0.5" opacity="0.2"/>

  <text
    x="350" y="222"
    font-family="'Playfair Display', 'Georgia', 'Times New Roman', serif"
    font-size="11" font-weight="400" letter-spacing="5"
    fill="#aaaaaa" text-anchor="middle"
  >A STATIC SITE GENERATOR</text>

  <text
    x="350" y="244"
    font-family="'Playfair Display', 'Georgia', 'Times New Roman', serif"
    font-size="12.5" font-weight="700" letter-spacing="4.5"
    fill="#222222" text-anchor="middle"
  >FOR PHOTOGRAPHERS ONLY.</text>

</svg>
