<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320" width="700" height="320">
  <defs>
    <linearGradient id="coneGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.0"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.07"/>
    </linearGradient>
    <radialGradient id="pinDot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#cccccc"/>
    </radialGradient>
    <radialGradient id="haloGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip"><rect width="700" height="320"/></clipPath>
  </defs>

  <rect width="700" height="320" fill="#0a0a0a"/>

  <polygon points="350,72 195,258 505,258" fill="url(#coneGrad)" clip-path="url(#clip)"/>
  <line x1="350" y1="72" x2="195" y2="258" stroke="#ffffff" stroke-width="0.4" opacity="0.12"/>
  <line x1="350" y1="72" x2="505" y2="258" stroke="#ffffff" stroke-width="0.4" opacity="0.12"/>
  <line x1="170" y1="258" x2="530" y2="258" stroke="#ffffff" stroke-width="0.5" opacity="0.2"/>

  <circle cx="350" cy="70" r="28" fill="url(#haloGrad)" filter="url(#glow)"/>
  <circle cx="350" cy="70" r="5" fill="url(#pinDot)" filter="url(#glow)"/>
  <circle cx="348.5" cy="68.5" r="1.6" fill="#ffffff" opacity="0.95"/>

  <text
    x="350" y="182"
    font-family="'Playfair Display', 'Georgia', 'Times New Roman', serif"
    font-size="64" font-weight="400" letter-spacing="14"
    fill="#ffffff" text-anchor="middle"
  >OBSCURA</text>

  <line x1="200" y1="200" x2="500" y2="200" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>

  <!-- Line 1: nudged up to 11px, tracking at 5 -->
  <text
    x="350" y="222"
    font-family="'Playfair Display', 'Georgia', 'Times New Roman', serif"
    font-size="11" font-weight="400" letter-spacing="5"
    fill="#888888" text-anchor="middle"
  >A STATIC SITE GENERATOR</text>

  <!-- Line 2: tracking pulled back to 4.5 — wider than v3 but not airy -->
  <text
    x="350" y="244"
    font-family="'Playfair Display', 'Georgia', 'Times New Roman', serif"
    font-size="12.5" font-weight="700" letter-spacing="4.5"
    fill="#cccccc" text-anchor="middle"
  >FOR PHOTOGRAPHERS ONLY.</text>

</svg>
