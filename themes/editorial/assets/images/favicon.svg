<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="cone" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.1"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="sq"><rect width="100" height="100" rx="18"/></clipPath>
  </defs>

  <rect width="100" height="100" rx="18" fill="#0a0a0a"/>

  <!-- Cone tip, dot, and rays all anchored to same point: cx=50, cy=22 -->
  <polygon points="50,22 16,82 84,82" fill="url(#cone)" clip-path="url(#sq)"/>
  <line x1="50" y1="22" x2="16" y2="82" stroke="#ffffff" stroke-width="0.5" opacity="0.15"/>
  <line x1="50" y1="22" x2="84" y2="82" stroke="#ffffff" stroke-width="0.5" opacity="0.15"/>
  <line x1="12" y1="82" x2="88" y2="82" stroke="#ffffff" stroke-width="0.6" opacity="0.2"/>

  <circle cx="50" cy="22" r="16" fill="url(#halo)" filter="url(#glow)"/>
  <circle cx="50" cy="22" r="4.5" fill="#ffffff" filter="url(#glow)"/>
</svg>
