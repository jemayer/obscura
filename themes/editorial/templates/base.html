<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ site.title }}{% endblock %}</title>
  <meta name="description" content="{% block description %}{{ site.title }}{% endblock %}">

  {% block og_meta %}{% endblock %}

  <link rel="alternate" type="application/rss+xml" title="{{ site.title }} RSS" href="{{ '/feed.xml' | url }}">
  <link rel="stylesheet" href="/assets/theme/css/style.css">
  <link rel="stylesheet" href="/assets/vendor/photoswipe/photoswipe.css">
  <link rel="stylesheet" href="/assets/theme/css/lightbox.css">

  <script>
    // Apply saved theme before first paint to prevent flash
    (function() {
      var t = localStorage.getItem('theme');
      if (t) document.documentElement.setAttribute('data-theme', t);
    })();
  </script>

  {% block head_extra %}{% endblock %}
</head>
<body>
  <header class="site-header">
    <div class="site-title">
      <a href="{{ '/' | url }}">{{ site.title }}</a>
    </div>
    <nav class="site-nav">
      <a href="{{ '/photography/' | url }}"{% if nav_current == 'photography' %} aria-current="page"{% endif %}>Photography</a>
      <a href="{{ '/blog/' | url }}"{% if nav_current == 'blog' %} aria-current="page"{% endif %}>Blog</a>
      <a href="{{ '/about/' | url }}"{% if nav_current == 'about' %} aria-current="page"{% endif %}>About</a>
      <button class="theme-toggle" type="button" aria-label="Toggle dark mode">
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
    </nav>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="site-footer__inner">
      <span>&copy; {{ current_year }} {{ site.title }}</span>
      <span>Built with <a href="https://github.com/comagen/comagen">comagen</a></span>
    </div>
  </footer>

  <script type="module">
    import PhotoSwipe from '/assets/vendor/photoswipe/photoswipe.esm.min.js';
    window.PhotoSwipe = PhotoSwipe;
  </script>
  <script src="/assets/theme/js/lightbox.js" defer></script>
  <script>
    (function() {
      var btn = document.querySelector('.theme-toggle');
      if (!btn) return;
      btn.addEventListener('click', function() {
        var root = document.documentElement;
        var current = root.getAttribute('data-theme');
        var isDark = current === 'dark' ||
          (!current && window.matchMedia('(prefers-color-scheme: dark)').matches);
        var next = isDark ? 'light' : 'dark';
        root.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
      });
    })();
  </script>
</body>
</html>
