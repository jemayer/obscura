<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ site.title }}{% endblock %}</title>
  <meta name="description" content="{% block description %}{{ site.title }}{% endblock %}">

  {% block og_meta %}{% endblock %}

  <link rel="alternate" type="application/rss+xml" title="{{ site.title }} RSS" href="{{ '/feed.xml' | url }}">
  <link rel="stylesheet" href="/assets/theme/css/style.css">
  <link rel="stylesheet" href="/assets/vendor/photoswipe/photoswipe.css">
  <link rel="stylesheet" href="/assets/theme/css/lightbox.css">

  {% block head_extra %}{% endblock %}
</head>
<body>
  <header class="site-header">
    <div class="site-title">
      <a href="{{ '/' | url }}">{{ site.title }}</a>
    </div>
    <nav class="site-nav">
      <a href="{{ '/photography/' | url }}"{% if nav_current == 'photography' %} aria-current="page"{% endif %}>Photography</a>
      <a href="{{ '/blog/' | url }}"{% if nav_current == 'blog' %} aria-current="page"{% endif %}>Blog</a>
      <a href="{{ '/about/' | url }}"{% if nav_current == 'about' %} aria-current="page"{% endif %}>About</a>
    </nav>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="site-footer__inner">
      <span>&copy; {{ current_year }} {{ site.title }}</span>
      <span>Built with <a href="https://github.com/comagen/comagen">comagen</a></span>
    </div>
  </footer>

  <script type="module">
    import PhotoSwipe from '/assets/vendor/photoswipe/photoswipe.esm.min.js';
    window.PhotoSwipe = PhotoSwipe;
  </script>
  <script src="/assets/theme/js/lightbox.js" defer></script>
</body>
</html>
