{% extends "base.html" %}

{% set nav_current = page.slug %}

{% block title %}{{ page.frontmatter.title }} — {{ site.title }}{% endblock %}

{% block og_meta %}
<meta property="og:type" content="website">
<meta property="og:title" content="{{ page.frontmatter.title }}">
<meta property="og:url" content="{{ ('/' + page.slug + '/') | absurl }}">
{% endblock %}

{% block content %}
<div class="content content--narrow">
  <h1 class="page-title">{{ page.frontmatter.title }}</h1>
  <div class="page-body">
    {{ page.renderedContent | safe_html }}
  </div>
</div>
{% endblock %}
